<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록 (테스트)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: #e94560;
    }
    .input-wrap {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    input[type="text"]::placeholder { color: #666; }
    button {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .btn-add {
      background: #e94560;
      color: #fff;
    }
    .btn-add:hover { background: #c73e54; }
    .btn-delete {
      background: #333;
      color: #ccc;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
    }
    .btn-delete:hover { background: #555; color: #fff; }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    li.done .text { text-decoration: line-through; color: #666; }
    .text { flex: 1; }
    .error { color: #e94560; margin-top: 0.5rem; font-size: 0.9rem; }
    .loading { color: #888; }
  </style>
</head>
<body>
  <h1>할 일 목록 (MongoDB 테스트)</h1>
  <div class="input-wrap">
    <input type="text" id="input" placeholder="할 일 입력 후 Enter 또는 추가" />
    <button type="button" class="btn-add" id="add">추가</button>
  </div>
  <p id="message" class="error"></p>
  <ul id="list"></ul>

  <script>
    const API = '/api/todos';
    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('input');
    const addBtn = document.getElementById('add');
    const messageEl = document.getElementById('message');

    function showError(msg) {
      messageEl.textContent = msg || '';
      messageEl.className = msg ? 'error' : '';
    }

    async function loadTodos() {
      showError('');
      listEl.innerHTML = '<li class="loading">불러오는 중...</li>';
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('목록 조회 실패');
        const todos = await res.json();
        render(todos);
      } catch (e) {
        showError('목록을 불러오지 못했습니다: ' + e.message);
        listEl.innerHTML = '';
      }
    }

    function render(todos) {
      if (todos.length === 0) {
        listEl.innerHTML = '<li class="loading">할 일이 없습니다. 위에서 추가해 보세요.</li>';
        return;
      }
      listEl.innerHTML = todos.map(t => `
        <li class="${t.completed ? 'done' : ''}" data-id="${t._id}">
          <input type="checkbox" ${t.completed ? 'checked' : ''} />
          <span class="text">${escapeHtml(t.title)}</span>
          <button type="button" class="btn-delete">삭제</button>
        </li>
      `).join('');

      listEl.querySelectorAll('li').forEach(li => {
        const id = li.dataset.id;
        li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggle(id));
        li.querySelector('.btn-delete').addEventListener('click', () => remove(id));
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function add() {
      const title = inputEl.value.trim();
      if (!title) return;
      showError('');
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || '추가 실패');
        }
        inputEl.value = '';
        await loadTodos();
      } catch (e) {
        showError(e.message);
      }
    }

    async function toggle(id) {
      const li = listEl.querySelector(`[data-id="${id}"]`);
      const done = li.querySelector('input').checked;
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed: done }),
        });
        if (!res.ok) throw new Error('수정 실패');
        li.classList.toggle('done', done);
      } catch (e) {
        li.querySelector('input').checked = !done;
        showError(e.message);
      }
    }

    async function remove(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('삭제 실패');
        await loadTodos();
      } catch (e) {
        showError(e.message);
      }
    }

    addBtn.addEventListener('click', add);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

    loadTodos();
  </script>
</body>
</html>
